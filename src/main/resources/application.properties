# ════════════════════════════════════════════════════════════════════
# AP13 NEWS — BASE CONFIGURATION
# src/main/resources/application.properties
# ════════════════════════════════════════════════════════════════════

server.port=${PORT:8080}

# Local dev DB (overridden by env vars in prod)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ap13}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=30000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

aws.s3.bucket=${AWS_S3_BUCKET:ap13-news-media}
aws.s3.region=${AWS_REGION:us-east-1}
aws.s3.base-url=https://${AWS_S3_BUCKET:ap13-news-media}.s3.${AWS_REGION:us-east-1}.amazonaws.com

app.jwt.secret=${JWT_SECRET:AP13SuperSecretKeyForJWTSigningMustBe256BitsLong!!2026}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

management.endpoints.web.exposure.include=health,info