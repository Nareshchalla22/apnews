# 1. Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/apnews_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Table Creation Logic
# Change this to 'create' for JUST ONE RUN to force the tables to appear
spring.jpa.hibernate.ddl-auto=update

# Add this to see the "CREATE TABLE" commands in your VS Code terminal
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. FIX: Use the modern Dialect or let Hibernate decide
# REMOVE the old MySQL8Dialect line and use this:
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect