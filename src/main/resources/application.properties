# =========================================================
# 1. DATABASE CONNECTION (RENDER PRODUCTION)
# =========================================================

# COMMENTED OUT LOCAL SETTINGS:
# spring.datasource.url=jdbc:mysql://localhost:3306/apnews_db?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=root

# PRODUCTION SETTINGS (Render will inject these values):
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# 2. HIBERNATE / JPA LOGIC
# =========================================================

# Use 'update' so Render doesn't delete your data every time the app restarts
spring.jpa.hibernate.ddl-auto=update

# Show SQL is helpful for debugging on Render logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Modern Dialect (Corrected for MySQL 8+)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =========================================================
# 3. RENDER DEPLOYMENT FIX
# =========================================================

# This is the MOST IMPORTANT line for Render to work
server.port=${PORT:8080}