# 1. DATABASE CONNECTION
# We add a default 'none' or a dummy local URL so it doesn't crash during build
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/apnews_db}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. HIBERNATE DIALECT (The Fix for your specific error)
# This line tells Hibernate exactly what language to speak without "asking" the DB
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# 3. RENDER PORT
server.port=${PORT:8080}

# 4. DEFER DATASOURCE (Add this line)
# This tells Spring NOT to crash if the DB isn't ready at the exact second of startup
spring.jpa.defer-datasource-initialization=true