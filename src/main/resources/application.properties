# ════════════════════════════════════════════════════════════════════
# AP13 NEWS — BASE CONFIGURATION
# src/main/resources/application.properties
# ════════════════════════════════════════════════════════════════════

server.port=${PORT:8080}


# ── AWS RDS POSTGRESQL ───────────────────────────────────────────────
# Replace <YOUR_RDS_ENDPOINT> with your actual RDS endpoint
# Format: ap13-db.xxxxxxxxxx.us-east-1.rds.amazonaws.com
spring.datasource.url=jdbc:postgresql://ap13-db.xxxxx.eu-north-1.rds.amazonaws.com:5432/ap13?sslmode=require
spring.datasource.username=${AWS_RDS_USERNAME}
spring.datasource.password=${AWS_RDS_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── CONNECTION POOL (optimized for t3.micro free tier) ───────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.keepalive-time=60000

# ── JPA / HIBERNATE ──────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.format_sql=false

# ── AWS S3 ───────────────────────────────────────────────────────────
aws.s3.bucket=${AWS_S3_BUCKET:ap13-news-media}
aws.s3.region=${AWS_REGION:us-east-1}
aws.access.key=${AWS_ACCESS_KEY_ID:AKIATN7ZMTWJ2ENGBYHU}
aws.secret.key=${AWS_SECRET_ACCESS_KEY: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}
aws.s3.base-url=https://${AWS_S3_BUCKET:ap13-news-media}.s3.${AWS_REGION:us-east-1}.amazonaws.com

# ── JWT ──────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:AP13SuperSecretKeyForJWTSigningMustBe256BitsLong!!2026}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ── LOGGING (reduced for production) ────────────────────────────────
logging.level.root=WARN
logging.level.com.news.apnews=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# ── MULTIPART FILE UPLOAD ────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ── ACTUATOR (health checks) ─────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never